<VirtualHost *:80>
    ServerName cohub-web-service.zeabur.app/
    DocumentRoot /var/www/html

    # Proxy requests to Laravel application
    ProxyPass / https://cohub-web-service.zeabur.app//
    ProxyPassReverse / https://cohub-web-service.zeabur.app//

    # Additional proxy settings (optional)
    ProxyPreserveHost On
    ProxyRequests Off

    # Log settings
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>